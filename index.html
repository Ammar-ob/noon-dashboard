<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>noon · Facilitators Operations Dashboard</title>
<style>
  :root{
    --bg:#0f1419; --panel:#171e26; --panel2:#1d2630; --line:#2a3540;
    --txt:#e8edf2; --mut:#8a99a8; --teal:#1ec8a5; --teal-d:#0f9b80;
    --green:#34d399; --amber:#f5b945; --red:#f06a6a; --blue:#5aa9e6;
    --shadow:0 6px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--txt);font-size:14px;line-height:1.4}
  .wrap{max-width:1260px;margin:0 auto;padding:22px 26px 60px}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .logo{font-size:26px;font-weight:800;letter-spacing:-1px;color:var(--teal)}
  .logo span{color:var(--txt)}
  .sub{color:var(--mut);font-size:13px}
  .role{display:flex;gap:8px;margin:18px 0 22px}
  .role button{background:var(--panel);border:1px solid var(--line);color:var(--mut);
    padding:8px 16px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
  .role button.active{background:var(--teal);color:#06231d;border-color:var(--teal)}
  .role button:not(.active):hover{color:var(--txt);border-color:var(--teal-d)}
  /* filters */
  .filterbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
  .ctx{display:flex;align-items:center;gap:8px;color:var(--mut);font-size:12px}
  .ctx select{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px}
  .ms{position:relative}
  .mstrig{background:var(--panel);border:1px solid var(--line);color:var(--mut);padding:8px 13px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
  .mstrig.has{color:var(--teal);border-color:var(--teal-d)}
  .mstrig .car{font-size:10px}
  .mspanel{position:absolute;z-index:40;top:112%;left:0;min-width:240px;max-width:320px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:8px}
  .mssearch{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:7px 9px;font-size:13px;margin-bottom:6px}
  .msrows{max-height:260px;overflow:auto}
  .msrow{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--txt)}
  .msrow:hover{background:var(--panel)}
  .msrow.on{color:var(--teal)}
  .msrow .ck{width:14px;display:inline-block;color:var(--teal);font-weight:800}
  .msclear{padding:7px 8px;color:var(--mut);font-size:12px;cursor:pointer;border-top:1px solid var(--line);margin-top:4px}
  .msclear:hover{color:var(--red)}
  .clearall{background:transparent;border:1px solid var(--line);color:var(--mut);padding:8px 12px;border-radius:9px;cursor:pointer;font-size:12px}
  .clearall:hover{color:var(--red);border-color:var(--red)}
  /* metric charts */
  .sectitle{font-size:17px;font-weight:800;margin:26px 0 2px}
  .secsub{color:var(--mut);font-size:12.5px;margin-bottom:12px}
  .cmpscope{display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .cmpscope button{background:var(--panel);border:1px solid var(--line);color:var(--mut);padding:6px 13px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;font-family:inherit}
  .cmpscope button.on{background:var(--teal);color:#06231d;border-color:var(--teal)}
  .cmpscope button:not(.on):hover{color:var(--txt);border-color:var(--teal-d)}
  .mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:8px}
  .mcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .mcard h4{font-size:13.5px;margin-bottom:2px}
  .mhead{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .vbadge{font-size:11px;font-weight:700;border-radius:20px;padding:2px 9px;white-space:nowrap}
  .vbadge.up{background:rgba(52,211,153,.15);color:var(--green)}
  .vbadge.down{background:rgba(240,106,106,.16);color:var(--red)}
  .cmp{margin-top:12px;display:flex;flex-direction:column;gap:12px}
  .cmprow{display:flex;align-items:center;gap:10px}
  .cmplab{font-size:12px;color:var(--mut);width:80px;flex:0 0 auto;text-align:start}
  .cmptrack{flex:1;height:14px;background:var(--bg);border-radius:8px;overflow:hidden}
  .cmptrack>i{display:block;height:100%;border-radius:8px;transition:width .3s}
  .cmpval{font-size:13px;width:52px;flex:0 0 auto;text-align:end}
  [dir=rtl] .cmptrack>i{float:right}
  .pie-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:10px}
  .pielegend{display:flex;flex-direction:column;gap:7px;width:100%}
  .pieleg{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--mut)}
  .pieleg b{color:var(--txt)}
  .mcard .mdesc{color:var(--mut);font-size:11.5px;margin-bottom:8px;min-height:30px}
  .mlegend{display:flex;gap:14px;font-size:11px;color:var(--mut);margin-top:8px;flex-wrap:wrap}
  .mlegend b{color:var(--txt)}
  .minsight{font-size:11.5px;color:var(--mut);margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}
  @media(max-width:760px){.mgrid{grid-template-columns:1fr}}
  /* language toggle + RTL */
  .langbtn{font-family:inherit}
  [dir=rtl] body{direction:rtl}
  [dir=rtl] th,[dir=rtl] td{text-align:right}
  [dir=rtl] td.num,[dir=rtl] th.num{text-align:left}
  [dir=rtl] .kpi .lbl,[dir=rtl] .crumb,[dir=rtl] .secsub{letter-spacing:0}
  [dir=rtl] .bar>i{float:right}
  /* sidebar layout */
  .layout{display:flex;gap:20px;align-items:flex-start}
  .sidebar{flex:0 0 212px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;position:sticky;top:18px}
  .sidebar button{display:flex;align-items:center;gap:9px;width:100%;text-align:start;background:transparent;border:none;color:var(--mut);padding:11px 12px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:600;margin-bottom:4px;font-family:inherit}
  .sidebar button.active{background:var(--teal);color:#06231d}
  .sidebar button:not(.active):not(:disabled):hover{background:var(--panel2);color:var(--txt)}
  .sidebar button:disabled{opacity:.38;cursor:not-allowed}
  .sidebar .sblabel{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);padding:4px 12px 8px}
  .main{flex:1;min-width:0}
  .sbtoggle{font-size:16px;line-height:1;padding:8px 13px!important;color:var(--mut)}
  .sbtoggle.on{color:var(--teal);border-color:var(--teal-d)!important}
  /* action plan */
  .apmetrics{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 6px}
  .apmetric{display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:7px 12px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--mut);font-family:inherit}
  .apmetric:hover{color:var(--txt);border-color:var(--teal-d)}
  .apmetric.active{background:var(--teal);color:#06231d;border-color:var(--teal)}
  .apmetric .ic{font-size:15px}
  .apbrief{font-size:14.5px;line-height:1.6;color:var(--txt);margin:6px 0 16px}
  .apchips{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .apchip{border:1px solid var(--line);border-inline-start-width:4px;border-radius:10px;padding:12px 16px;background:var(--panel2)}
  .apchip .apnum{font-size:30px;font-weight:800;line-height:1}
  .apchip .aplbl{font-size:12.5px;color:var(--txt);font-weight:600;margin-top:3px}
  .apchip .appct{font-size:11px;color:var(--mut)}
  .pills{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
  .namepill{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:12.5px;display:inline-flex;align-items:center;gap:4px}
  .namepill.starred{border-color:var(--amber);color:var(--amber)}
  .starbtn{background:transparent;border:none;cursor:pointer;color:var(--amber);font-size:15px;line-height:1;padding:0}
  .card h3 .dot{width:11px;height:11px}
  .rankcell{font-weight:800;font-size:14px;color:var(--mut)}
  .tscroll{overflow-x:auto}
  .tscroll table{min-width:980px}
  .tscroll th,.tscroll td{padding:9px 8px;white-space:nowrap}
  .tscroll td.twrap{white-space:normal;min-width:180px;max-width:240px}
  .todolist{margin-top:4px}
  .todo{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line)}
  .todo:last-child{border-bottom:none}
  .todo input[type=checkbox]{margin-top:3px;width:17px;height:17px;accent-color:var(--teal);cursor:pointer;flex:0 0 auto}
  .todo.done .todobody{opacity:.5}
  .todo.done .todohead b{text-decoration:line-through}
  .todobody{flex:1;min-width:0}
  .todoaction{font-size:12.5px;color:var(--txt);margin:3px 0 7px}
  .cmt{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:7px 10px;font-size:12.5px;font-family:inherit}
  .cmt:focus{outline:none;border-color:var(--teal-d)}
  .cmt.reqd{border-color:var(--red)}
  .reqmsg{color:var(--red);font-size:11.5px;margin-top:5px;font-weight:600}
  .apstudent{border:1px solid var(--line);border-radius:12px;padding:6px 16px 10px;margin-bottom:12px;background:var(--panel2)}
  .apstudent-head{display:flex;align-items:center;gap:10px;font-size:14.5px;padding:10px 2px;border-bottom:1px solid var(--line);margin-bottom:4px}
  .apstudent-head .prog{font-size:12px;font-weight:700;color:var(--mut);background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:2px 10px}
  .ai-actions{margin-inline-start:auto;display:flex;gap:6px;flex-wrap:wrap}
  .impact{margin-top:7px;margin-inline-start:32px;font-size:12px;font-weight:700;border-radius:8px;padding:5px 10px;display:inline-block}
  .impact.up{background:rgba(52,211,153,.13);color:var(--green)}
  .impact.flat{background:rgba(138,153,168,.13);color:var(--mut)}
  [dir=rtl] .impact{margin-inline-start:0;margin-inline-end:32px}
  .actbtn.ai{border-color:#a78bfa;color:#a78bfa}
  .actbtn.exp{border-color:var(--blue);color:var(--blue);padding:3px 9px;font-size:11px}
  .prow2{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);margin-bottom:8px}
  .prow2-name{display:flex;align-items:center;gap:6px;font-size:13.5px;flex-wrap:wrap}
  .lowbox{position:relative}
  .lowbox>.actbtn.exp{position:absolute;top:10px;inset-inline-end:12px}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:20px}
  .modal-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:560px;width:100%;box-shadow:var(--shadow)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);font-size:15px}
  .modal-x{background:transparent;border:none;color:var(--mut);font-size:16px;cursor:pointer}
  .modal-body{padding:18px;font-size:13.5px;line-height:1.7;color:var(--txt);white-space:pre-wrap;max-height:60vh;overflow:auto}
  .modal-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 18px;border-top:1px solid var(--line)}
  .apstudent-head .prog.all{color:var(--green);border-color:var(--green)}
  .execsum{font-size:12.5px;color:var(--mut);line-height:1.6;margin:8px 2px 8px;padding-inline-start:8px;border-inline-start:3px solid var(--amber)}
  .execsum .urgent{color:var(--red);font-weight:700}
  .task{padding:9px 2px;border-bottom:1px solid var(--line)}
  .task:last-child{border-bottom:none}
  .taskmain{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .chk{flex:0 0 auto;width:22px;height:22px;border-radius:50%;border:2px solid var(--line);background:transparent;color:#06231d;font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
  .chk:hover{border-color:var(--teal-d)}
  .chk.on{background:var(--teal);border-color:var(--teal)}
  .tag{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--amber);white-space:nowrap}
  .taskaction{font-size:12.5px;color:var(--txt);flex:1;min-width:150px}
  .task.done .taskaction{text-decoration:line-through;color:var(--mut)}
  .task.done .tag{opacity:.6}
  .noteBtn{flex:0 0 auto;background:transparent;border:none;cursor:pointer;font-size:15px;opacity:.4;padding:0}
  .noteBtn:hover{opacity:1}
  .noteBtn.has{opacity:1}
  .notewrap{margin:8px 0 2px 32px}
  .notedone{font-size:12px;color:var(--mut);margin:6px 0 2px 32px}
  .apcomment{margin-top:10px}
  .dateinput{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 11px;font-size:12.5px;font-family:inherit;color-scheme:dark}
  .drow{padding:11px 2px;border-bottom:1px solid var(--line)}
  .drow:last-child{border-bottom:none}
  .drow-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:14px}
  .dtrend{margin-inline-start:auto;font-size:11.5px;font-weight:700}
  .dtrend.over{color:var(--green)} .dtrend.low{color:var(--red)} .dtrend.normal{color:var(--mut)}
  .badge{background:rgba(52,211,153,.15);color:var(--green);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700}
  .badge.neg{background:rgba(240,106,106,.16);color:var(--red)}
  .dstats{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .dstat{display:inline-flex;align-items:center;gap:5px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:4px 9px;font-size:12px}
  .dstat .dlbl{color:var(--mut)}
  .dayreason{font-size:12.5px;margin:7px 0 2px;padding-inline-start:8px;border-inline-start:3px solid var(--line)}
  .dayreason.low{color:var(--red);border-inline-start-color:var(--red)}
  .dayreason.over{color:var(--green);border-inline-start-color:var(--green)}
  .abslist{display:flex;flex-direction:column;gap:8px}
  .absrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:7px 10px;border:1px solid var(--line);border-radius:10px;background:var(--panel2)}
  .absname{display:flex;align-items:center;gap:4px;font-size:13.5px}
  .actbtns{margin-inline-start:auto;display:flex;gap:8px}
  .actbtn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;color:var(--txt);background:var(--bg);font-family:inherit}
  .actbtn.wa{border-color:#25d366;color:#25d366}
  .actbtn.call{border-color:var(--blue);color:var(--blue)}
  .actbtn.praise{border-color:var(--amber);color:var(--amber)}
  .actbtn:hover{filter:brightness(1.2)}
  .avatar{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;color:#06231d;font-weight:800;font-size:13px;flex:0 0 auto;vertical-align:middle;margin-inline-end:8px;text-transform:uppercase}
  .avatar.sm{width:22px;height:22px;font-size:11px;margin-inline-end:6px}
  td .avatar{margin-inline-end:9px}
  [dir=rtl] .notewrap,[dir=rtl] .notedone{margin-left:0;margin-right:32px}
  @media(max-width:760px){.layout{flex-direction:column}.sidebar{position:static;width:100%;display:flex;gap:6px;flex-wrap:wrap}.sidebar .sblabel{display:none}.sidebar button{width:auto}}
  .crumb{color:var(--mut);font-size:13px;margin-bottom:14px}
  .crumb a{color:var(--teal);cursor:pointer;text-decoration:none}
  .crumb a:hover{text-decoration:underline}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .kpi .lbl{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .kpi .val{font-size:26px;font-weight:800;margin-top:4px}
  .kpi .note{font-size:11px;color:var(--mut);margin-top:2px}
  .kpidelta{font-size:12px;font-weight:700;margin-top:5px}
  .kpicmp{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .kpicmp button{background:var(--panel);border:1px solid var(--line);color:var(--mut);padding:6px 13px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;font-family:inherit}
  .kpicmp button.on{background:var(--teal);color:#06231d;border-color:var(--teal)}
  .kpicmp button:not(.on):hover{color:var(--txt);border-color:var(--teal-d)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .card h3{font-size:14px;margin-bottom:4px}
  .card .desc{color:var(--mut);font-size:12px;margin-bottom:14px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:9px 10px;font-size:13px;border-bottom:1px solid var(--line)}
  th{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none}
  th:hover{color:var(--txt)}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:var(--panel2)}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .bar{height:6px;border-radius:4px;background:var(--line);overflow:hidden;min-width:60px;margin-top:4px}
  .bar>i{display:block;height:100%;border-radius:4px}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
  .p-green{background:rgba(52,211,153,.15);color:var(--green)}
  .p-amber{background:rgba(245,185,69,.15);color:var(--amber)}
  .p-red{background:rgba(240,106,106,.16);color:var(--red)}
  .p-blue{background:rgba(90,169,230,.15);color:var(--blue)}
  .flag{font-size:11px;color:var(--mut)}
  .rankbar{display:flex;align-items:center;gap:8px}
  .mini{flex:1}
  .legend{display:flex;gap:16px;color:var(--mut);font-size:11px;margin-top:10px;flex-wrap:wrap}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .full{grid-column:1 / -1;margin-bottom:16px}
  .hint{color:var(--mut);font-size:12px;margin-top:10px}
  .stack{display:flex;height:26px;border-radius:6px;overflow:hidden;margin-top:6px}
  .stack>i{display:block;height:100%}
  .scatcell{position:relative}
</style>
</head>
<body>
<div id="gate" style="position:fixed;inset:0;z-index:1000;background:#0f1419;display:flex;align-items:center;justify-content:center">
  <div style="background:#171e26;border:1px solid #2a3540;border-radius:16px;padding:34px 30px;width:320px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.5)">
    <div style="font-size:28px;font-weight:800;color:#1ec8a5;letter-spacing:-1px">no·on</div>
    <div style="color:#8a99a8;font-size:13px;margin:8px 0 20px">لوحة عمليات الميسّرين — الدخول</div>
    <input id="gatePw" type="password" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')tryGate()"
      style="width:100%;background:#0f1419;border:1px solid #2a3540;color:#e8edf2;border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;text-align:center">
    <div id="gateErr" style="color:#f06a6a;font-size:12px;height:16px;margin-top:8px"></div>
    <button onclick="tryGate()" style="width:100%;background:#1ec8a5;color:#06231d;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px">دخول</button>
  </div>
</div>
<script>
  const GATE_PASSWORD="noon2026";
  function tryGate(){const v=document.getElementById('gatePw').value;
    if(v===GATE_PASSWORD){localStorage.setItem('noonGate','1');document.getElementById('gate').style.display='none';}
    else{document.getElementById('gateErr').textContent='كلمة المرور غير صحيحة';}}

/* ---------- sidebar / tabs ---------- */
function sidebar(){
  const actionOn = state.role=='fac';
  const tabs=[];
  if(actionOn) tabs.push(['today','🗓️ '+tr("Today's overview"),true]);
  tabs.push(['action','📋 '+tr('Weekly Action Plan'),actionOn]);
  tabs.push(['dashboard','📊 '+tr('Performance Dashboard'),true]);
  return tabs.map(([k,lbl,on])=>`<button data-tab="${k}" class="${state.tab==k?'active':''}" ${on?`onclick="setTab('${k}')"`:'disabled'}>${lbl}</button>`).join('');
}
function setTab(t){state.tab=t; render();}
function toggleSb(){state.sbOpen=!state.sbOpen; render();}
function toggleStar(id){state.stars[id]=!state.stars[id]; render();}
function toggleTodo(id){
  state.todoDone[id]=!state.todoDone[id];
  if(state.todoDone[id]){ state.outcomes=state.outcomes||{}; if(!state.outcomes[id]) state.outcomes[id]=Date.now(); }
  render();
}
/* did the intervention help? deterministic dummy follow-up after a task is completed */
function impact(id){
  const o=(state.outcomes||{})[id]; if(!o) return null;
  const seed=hashStr(id+'#imp'); const improved=rng(seed)<0.72; const mag=2+Math.floor(rng(seed+1)*7);
  return {improved, mag};
}
function setComment(id,v){state.comments[id]=v;}
function toggleNote(id){state.openNote=state.openNote==id?null:id; state.needComment=null; render();}
/* performance score (outcome + gain + accuracy + mastery) → category */
function perf(s){return compositeScore(s);}   // now blends ALL metrics
function perfCat(s){const p=perf(s); return p>=0.70?'great':(p<0.60?'low':'mid');}
/* clear, action-oriented explanation of a student's tier + how to move them up */
function explainTier(id){
  const s=STUDENTS.find(x=>x.id==id), ar=state.lang=='ar';
  const score=Math.round(compositeScore(s)*100), cat=perfCat(s);
  const catName={great:ar?'أداء ممتاز':'High performance',mid:ar?'أداء متوسط':'Mid performance',low:ar?'أداء منخفض':'Low performance'}[cat];
  const M=[['eoc','نهاية المقرر','EOC mastery'],['corr','دقة التدريب','Practice accuracy'],['exit','تذكرة الخروج','Exit tickets'],['mission','إكمال المهام','Mission completion'],['att','الحضور','Attendance'],['temp','المشاركة','Participation'],['trust','الثقة','Trust']];
  const strong=[],focus=[];
  M.forEach(([k,aw,en])=>{const v=s[k]; if(v==null)return; const lbl=ar?aw:en;
    if(v>=0.75) strong.push(`${lbl} ${Math.round(v*100)}%`);
    else if(v<0.6) focus.push({lbl,pct:Math.round(v*100),act:tr(METRIC_LOW_ACTION[k]||'')});});
  focus.sort((a,b)=>a.pct-b.pct);
  const top=focus.slice(0,3);
  const L=[];
  // headline
  L.push(ar?`**${s.name}** · التقييم الإجمالي **${score}%** · **${catName}**`
           :`**${s.name}** · overall **${score}%** · **${catName}**`);
  L.push('───');
  // strengths
  if(strong.length) L.push((ar?'✅ **نقاط القوة:** ':'✅ **Strengths:** ')+strong.join(ar?' · ':' · '));
  // focus areas with actions
  if(top.length){
    L.push(ar?'🎯 **ركّز هنا (الأضعف أولًا):**':'🎯 **Focus here (weakest first):**');
    top.forEach(f=>L.push(`• **${f.lbl} (${f.pct}%)** — ${f.act}`));
  }
  // next-step to move up a tier
  L.push('───');
  if(cat=='low') L.push(ar?'⬆️ **للوصول للأداء المتوسط:** عالِج أول نقطة ضعف أعلاه هذا الأسبوع، وتابع أثرها.'
                          :'⬆️ **To reach Mid:** tackle the top focus area above this week and track the impact.');
  else if(cat=='mid') L.push(ar?'⬆️ **للوصول للأداء الممتاز:** ارفع نقطة أو نقطتين من «ركّز هنا» فوق 75%.'
                              :'⬆️ **To reach High:** lift one or two focus areas above 75%.');
  else L.push(ar?'🌟 **حافظ على تميّزه:** امنحه تحديًا أكبر ودورًا قياديًا، وكافئ تقدّمه.'
                :'🌟 **Keep them excelling:** give a stretch challenge and a leadership role, and recognise progress.');
  openModal((cat=='great'?'🌟 ':cat=='low'?'⚠️ ':'📊 ')+catName, L.join('\n'));
}

function apCat(s,m){
  if(m.k=='overall') return perfCat(s);
  const v=s[m.k]; if(v==null) return 'mid';
  return v>=m.g?'great':(v<m.l?'low':'mid');
}
/* deterministic dummy week-over-week change (current minus last week), −8..+8 pts */
function seedRand(id){const x=Math.sin(id*12.9898+78.233)*43758.5453; return x-Math.floor(x);}
function weekChange(s){return (seedRand(s.id)-0.5)*0.16;}

/* executive summary: WHY flagged · the trend · what's wrong · how to fix — vs classmates & last week */
function execSummary(s){
  const ar=state.lang=='ar';
  const peers=scoped().filter(p=>p.id!=s.id), pm=k=>meanOf(peers,k);
  const score=compositeScore(s), classAvg=mean(peers.map(compositeScore));
  const parts=[];
  // 1) why he's flagged — vs the class
  const belowBy=classAvg!=null?Math.round((classAvg-score)*100):0;
  parts.push(ar
    ? `تقييمه ${pct(score)} — أدنى من متوسط الفصل (${pct(classAvg)}) بـ ${belowBy} نقطة، لذلك ظهر ضمن الأضعف.`
    : `Scoring ${pct(score)} — ${belowBy} pts under the class average (${pct(classAvg)}), which is why he's flagged.`);
  // 2) the trend — vs last week
  const wc=weekChange(s);
  if(wc<-0.005) parts.push(ar
    ? `<span class="urgent">⚠ انخفض ${Math.round(-wc*100)} نقطة عن الأسبوع الماضي — يتطلب تدخّلًا فوريًا.</span>`
    : `<span class="urgent">⚠ Down ${Math.round(-wc*100)} pts vs last week — needs immediate action.</span>`);
  else if(wc>0.02) parts.push(ar
    ? `تحسّن طفيف عن الأسبوع الماضي لكنه ما زال دون مستوى الفصل.`
    : `Slightly up vs last week but still below the class.`);
  // 3) what's wrong — biggest gaps vs classmates
  const gaps=AP_METRICS.filter(m=>m.l!=null&&s[m.k]!=null).map(m=>{
    const avg=pm(m.k); if(avg==null) return null;
    const isC=m.k=='practice';
    return {m, gap:isC?(s[m.k]-avg)/(avg||1):s[m.k]-avg, below:s[m.k]<avg};
  }).filter(x=>x&&x.below).sort((a,b)=>a.gap-b.gap).slice(0,2);
  if(gaps.length){
    const ph=x=>{const lbl=tr(x.m.label).replace('نسبة ','').replace('Avg ','');
      return x.m.k=='practice'?(ar?`${lbl} أقل بكثير`:`much lower ${lbl.toLowerCase()}`)
        :(ar?`${lbl} (−${Math.round(Math.abs(x.gap)*100)} نقطة)`:`${lbl.toLowerCase()} (−${Math.round(Math.abs(x.gap)*100)} pts)`);};
    parts.push(ar?`أبرز الفجوات مقابل زملائه: ${gaps.map(ph).join(' و')}.`:`Biggest gaps vs classmates: ${gaps.map(ph).join(' & ')}.`);
    const act=METRIC_LOW_ACTION[gaps[0].m.k];
    if(act) parts.push(ar?`الحل: ${tr(act)}`:`Fix: ${tr(act)}`);
  } else {
    parts.push(ar?`لا يوجد سبب واحد واضح — جلسة فردية لتحديد الفجوة.`:`No single clear driver — hold a 1:1 to pinpoint the gap.`);
  }
  return parts.join(' ');
}

/* the 1–2 MOST severe weak metrics → tag (icon+label) + its targeted action.
   Kept short on purpose so the supervisor isn't overwhelmed. */
function weakTags(s){
  const peers=scoped().filter(p=>p.id!=s.id);
  const tags=AP_METRICS.filter(m=>m.l!=null && s[m.k]!=null && s[m.k]<m.l)
    .map(m=>{
      const avg=meanOf(peers,m.k);
      const sev=avg==null?(m.l-s[m.k]):(m.k=='practice'?(avg-s[m.k])/(avg||1):avg-s[m.k]); // how far below the class
      return {k:m.k, ic:m.ic, label:m.label, action:METRIC_LOW_ACTION[m.k]||'Review the case with the student.', sev};
    })
    .sort((a,b)=>b.sev-a.sev)
    .slice(0,2);
  if(!tags.length){const w=whereLow(s); tags.push({k:'overall', ic:'📊', label:'Overall', action:w.action});}
  return tags;
}
function lowInfo(s,m){
  if(m.k=='overall') return whereLow(s);
  return {areas:[m.label], action:METRIC_LOW_ACTION[m.k]||'Overall low — 1:1 to set clear targets.'};
}
function setApMetric(k){state.apMetric=k; render();}
/* for a low performer: which area drives it + a targeted action */
function whereLow(s){
  const g=(s.eoc!=null&&s.diag!=null)?s.eoc-s.diag:1;
  const checks=[
    ['EOC mastery', s.eoc!=null&&s.eoc<0.55, METRIC_LOW_ACTION.eoc],
    ['Practice accuracy', s.corr!=null&&s.corr<0.35, METRIC_LOW_ACTION.corr],
    ['Learning gain', g<0.05, 'Sit with him to understand the drop and reconnect him with the teacher for a plan this week.'],
    ['Exit tickets', s.exit!=null&&s.exit<0.55, METRIC_LOW_ACTION.exit],
    ['Mission completion', s.mission!=null&&s.mission<0.6, METRIC_LOW_ACTION.mission],
    ['Attendance', s.att!=null&&s.att<0.8, METRIC_LOW_ACTION.att],
    ['Trust', s.trust!=null&&s.trust<0.5, METRIC_LOW_ACTION.trust]
  ].filter(c=>c[1]);
  if(!checks.length) return {areas:['Overall low'], action:'Review the case with the student.'};
  return {areas:checks.slice(0,2).map(c=>c[0]), action:checks[0][2]};
}

function hashStr(str){let h=0;for(let i=0;i<str.length;i++)h=(h*31+str.charCodeAt(i))|0;return h;}
/* small placeholder profile avatar: initial + deterministic colored background */
const AV_COLORS=['#1ec8a5','#5aa9e6','#f5b945','#f06a6a','#a78bfa','#34d399','#fb7185','#38bdf8','#fbbf24','#4ade80','#e879f9','#22d3ee'];

}
function rng(seed){seed=(seed|0)^0x9e3779b9; seed=Math.imul(seed^(seed>>>16),0x21f0aaad); seed=Math.imul(seed^(seed>>>15),0x735a2d97); seed=seed^(seed>>>15); return ((seed>>>0)%100000)/100000;}
/* deterministic daily data per student per date (dummy, varies around their own average) */
function dailyData(s,dk){
  const b=hashStr(dk+'#'+s.id);
  // mostly hugs the student's own average; rare TRUE spikes to 100% (good) or 0% (bad) → exceptional days
  const sp={};
  const metric=(key,off,center,spread)=>{const r=rng(b+off);
    if(r>0.98){sp[key]=1;return 1;} if(r<0.02){sp[key]=-1;return 0;}
    sp[key]=0; return Math.max(0,Math.min(1,(center??0.7)+(rng(b+off+100)-0.5)*2*spread));};
  return {
    present: rng(b+1) < Math.min(0.97,(s.att??0.9)+0.04),
    mission: metric('mission',2,s.mission,0.10),
    corr: metric('corr',3,s.corr,0.10),
    temp: metric('temp',4,s.temp,0.10),
    practice: Math.max(0,Math.round((s.practice/40)*(0.6+rng(b+5)*0.8))),
    spikes: sp
  };
}
function dailyOverview(data){
  const dk=curDate(), rows=data.map(s=>({s,d:dailyData(s,dk)}));
  const absent=rows.filter(r=>!r.d.present), present=rows.filter(r=>r.d.present);
  const classify=r=>{
    // delta vs the student's own average across the daily performance factors:
    // mission, practice volume, correct-practice accuracy, participation. (Attendance is
    // handled by the absent list; for a present student it's neutral.)
    const typPr=(r.s.practice/40)||1;
    const factors=[
      r.d.mission-(r.s.mission??r.d.mission),                            // mission completion
      Math.max(-0.5,Math.min(0.5,(r.d.practice/typPr-1)))*0.6,           // practice volume (ratio, capped)
      r.d.corr-(r.s.corr??r.d.corr),                                     // correct practice
      r.d.temp-(r.s.temp??r.d.temp)                                      // participation
    ];
    const delta=factors.reduce((a,b)=>a+b,0)/factors.length;
    const badges=[], rb=hashStr(dk+'#'+r.s.id+'#x');
    const sp=r.d.spikes||{};
    // positive exceptional (true spikes only)
    if(sp.mission==1) badges.push({t:'All missions done today',pos:true});
    if(sp.corr==1) badges.push({t:'Perfect accuracy today',pos:true});
    if(sp.temp==1) badges.push({t:'Full participation today',pos:true});
    if(r.s.att!=null&&r.s.att>=1 && rng(rb+1)>0.95) badges.push({t:'Perfect attendance record',pos:true});
    // negative exceptional (true spikes only)
    if(sp.mission==-1) badges.push({t:'No missions done today',pos:false});
    if(sp.corr==-1) badges.push({t:'Very low accuracy today',pos:false});
    if(sp.temp==-1) badges.push({t:'No participation today',pos:false});
    const hasNeg=badges.some(x=>!x.pos), hasPos=badges.some(x=>x.pos);
    let g = hasNeg?'low' : hasPos?'over' : delta>=0.06?'over' : delta<=-0.06?'low' : 'normal';
    return {delta,badges,g};
  };
  present.forEach(r=>Object.assign(r,classify(r)));
  const low=present.filter(r=>r.g=='low'), over=present.filter(r=>r.g=='over'), normal=present.filter(r=>r.g=='normal');
  const dpct=v=>Math.round(v*100)+'%';
  const stat=(lbl,dayV,avgV,count)=>{const up=dayV>=avgV;return `<span class="dstat"><span class="dlbl">${tr(lbl)}</span><b>${count?kfmt(dayV):dpct(dayV)}</b><span style="color:${up?'var(--green)':'var(--red)'}">${up?'▲':'▼'}</span></span>`;};
  const metricsOf=r=>`<div class="dstats">${stat('Missions',r.d.mission,r.s.mission)}${stat('Accuracy',r.d.corr,r.s.corr)}${stat('Temp',r.d.temp,r.s.temp)}${stat('Practice',r.d.practice,r.s.practice/40,true)}</div>`;
  const trend=r=>{const ar=state.lang=='ar';const pts=Math.round(Math.abs(r.delta)*100);
    return r.g=='over'?(ar?`+${pts} نقطة ${tr('above their own average')}`:`+${pts} pts ${tr('above their own average')}`)
      :r.g=='low'?(ar?`−${pts} نقطة ${tr('below their own average')}`:`−${pts} pts ${tr('below their own average')}`)
      :tr('around their own average');};
  // short, direct reason: the strongest factor moving the student today
  const dayReason=r=>{
    const ar=state.lang=='ar';
    const cand=[
      ['mission', r.d.mission-r.s.mission],
      ['corr', r.d.corr-r.s.corr],
      ['temp', r.d.temp-r.s.temp],
      ['practice', Math.max(-0.5,Math.min(0.5,(r.d.practice/((r.s.practice/40)||1)-1)))]
    ];
    const want = r.g=='over';
    cand.sort((a,b)=> want ? b[1]-a[1] : a[1]-b[1]);
    const k=cand[0][0];
    const W={ar:{mission:'إكمال المهام',corr:'دقة التدريب',temp:'المشاركة',practice:'حجم التدريب'},
             en:{mission:'mission completion',corr:'accuracy',temp:'participation',practice:'practice volume'}};
    const name=W[ar?'ar':'en'][k];
    if(want) return ar?`متميّز اليوم بسبب ارتفاع ${name} عن معدّله.`:`Standout today thanks to higher ${name} than usual.`;
    return ar?`منخفض اليوم بسبب تراجع ${name} عن معدّله.`:`Low today due to a drop in ${name} below their usual.`;
  };
  const studentRow=r=>`<div class="drow">
      <div class="drow-top">${avatar(r.s)}<b>${r.s.name}</b> <span class="flag">· ${facName(r.s.fac)}</span>

/* ---------- helpers ---------- */
const $ = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;}
const pct = v => v==null?'—':Math.round(v*100)+'%';
const f2  = v => v==null?'—':(v*100).toFixed(0);
const mean = a => a.length? a.reduce((s,x)=>s+x,0)/a.length : null;
const meanOf = (arr,k)=>{const v=arr.map(x=>x[k]).filter(x=>x!=null); return mean(v);}
const growth = s => (s.eoc!=null&&s.diag!=null)? s.eoc-s.diag : null;

/* color scales */
function gColor(g){ if(g==null)return 'var(--mut)'; if(g>=0.20)return 'var(--green)'; if(g>=0.10)return 'var(--teal)'; if(g>=0.03)return 'var(--amber)'; return 'var(--red)';}
function scoreColor(v){ if(v==null)return 'var(--mut)'; if(v>=.8)return 'var(--green)'; if(v>=.6)return 'var(--teal)'; if(v>=.45)return 'var(--amber)'; return 'var(--red)';}

/* ---------- attention model (student level) ---------- */
// Each student gets flags. Priority = weighted severity. Transparent + explainable.
function assess(s){
  const g = growth(s);
  const flags=[];
  if(g!=null && g<0)               flags.push({k:'declined', sev:3, txt:'Score dropped since diagnostic'});
  else if(g!=null && g<0.05)       flags.push({k:'stalled',  sev:2, txt:'Almost no learning gain'});
  if(s.att!=null && s.att<0.80)    flags.push({k:'attend',   sev:2, txt:'Attendance below 80%'});
  if(s.corr!=null && s.corr<0.35 && s.exit!=null && s.exit<0.55)
                                   flags.push({k:'notlearn', sev:2, txt:'Practising but not mastering'});
  if(s.eoc!=null && s.eoc<0.55)    flags.push({k:'eoc',      sev:2, txt:'Low end-of-course mastery'});
  if(s.mission!=null && s.mission<0.6) flags.push({k:'mission', sev:1, txt:'Missions incomplete'});
  if(s.trust!=null && s.trust<0.5) flags.push({k:'trust',    sev:2, txt:'Low trust in the experience'});
  if(s.temp!=null && s.temp<0.5)   flags.push({k:'temp',     sev:1, txt:'Low classroom engagement'});
  if(s.practice!=null && s.practice<800) flags.push({k:'practice', sev:1, txt:'Very little practice volume'});
  // working hard but inefficient
  if(s.mission!=null&&s.mission>=0.85 && s.corr!=null&&s.corr<0.35 && (g==null||g<0.1))
                                   flags.push({k:'grind',    sev:2, txt:'Working hard, low return'});
  const score = flags.reduce((a,b)=>a+b.sev,0);
  let tier='ok';
  if(score>=4) tier='high'; else if(score>=2) tier='med'; else if(score>=1) tier='low';
  return {g,flags,score,tier};
}
const TIER = {high:{t:'High',c:'p-red'},med:{t:'Medium',c:'p-amber'},low:{t:'Watch',c:'p-blue'},ok:{t:'On track',c:'p-green'}};

/* recommended next action from dominant flag */
function action(s,a){
  if(!a.flags.length) return 'Keep the momentum — recognise his progress in front of everyone.';
  const top=[...a.flags].sort((x,y)=>y.sev-x.sev)[0].k;
  const map={
    declined:'Sit with him to understand the drop and reconnect him with the teacher for a plan this week.',
    stalled:'Track his progress closely and encourage him to ask the teacher for a review plan.',
    attend:'Reach out to the student/home about absences and re-engage him.',
    notlearn:'Encourage him to review his mistakes with the teacher and ask about the right approach.',
    grind:'His effort is high — connect him with the teacher to adjust technique; encourage asking over repeating.',
    mission:'Ask why missions stall (time, difficulty, or motivation) and remove the blocker.',
    trust:'Check in on how he feels about class and relay his feedback to the teacher.',
    temp:'Involve him more in class, give him a role, and encourage him to participate and ask.',
    eoc:'Connect him with the teacher to review the hard concepts; encourage him to ask more in class.',
    practice:'Encourage a simple daily practice habit and follow up.'
  };
  return map[top]||'Review the case with the student.';
}

/* composite performance score — blends ALL metrics (0–1) */
const clamp01=x=>Math.max(0,Math.min(1,x));
function compositeScore(s){
  const g=clamp01(((s.eoc??0)-(s.diag??0))/0.4);          // learning gain
  const pn=clamp01((s.practice||0)/5000);                  // practice volume
  const parts=[s.eoc,s.att,s.mission,s.trust,s.corr,s.exit,s.temp,s.diag,g,pn].filter(v=>v!=null);
  return parts.reduce((a,b)=>a+b,0)/parts.length;
}

/* ---------- aggregation ---------- */
function agg(arr){
  const as = arr.map(assess);
  return {
    n:arr.length,
    score:mean(arr.map(compositeScore)),
    growth:mean(arr.map(growth).filter(x=>x!=null)),
    eoc:meanOf(arr,'eoc'), diag:meanOf(arr,'diag'),
    att:meanOf(arr,'att'), mission:meanOf(arr,'mission'),
    corr:meanOf(arr,'corr'), exit:meanOf(arr,'exit'),
    trust:meanOf(arr,'trust'), temp:meanOf(arr,'temp'),
    practice:meanOf(arr,'practice'),
    high:as.filter(a=>a.tier=='high').length,
    med:as.filter(a=>a.tier=='med').length,
    ok:as.filter(a=>a.tier=='ok').length,
    atRisk:as.filter(a=>a.tier=='high'||a.tier=='med').length
  };
}
const groupBy=(arr,k)=>arr.reduce((m,x)=>((m[x[k]]=m[x[k]]||[]).push(x),m),{});

const svgW=(inner,h=158)=>`<svg viewBox="0 0 320 ${h}" width="100%" style="display:block">${inner}</svg>`;
const kfmt=v=>v>=1000?(v/1000).toFixed(1).replace('.0','')+'k':Math.round(v);

/* histogram with you-vs-network reference lines; red bars flag the concerning tail */
function histChart(vals,o){
  vals=vals.filter(v=>v!=null);
  const {min,max,bins,fmt,cm,nm,thresh,pctTicks}=o;
  const cnt=Array(bins).fill(0);
  vals.forEach(v=>{let b=Math.floor((v-min)/(max-min)*bins); b=Math.max(0,Math.min(bins-1,b)); cnt[b]++;});
  const mx=Math.max(...cnt,1);
  const x0=34,x1=308,y0=18,yb=120, bw=(x1-x0)/bins;
  const xof=v=>x0+(v-min)/(max-min)*(x1-x0);
  let bars='';
  for(let i=0;i<bins;i++){
    const h=(cnt[i]/mx)*(yb-y0), x=x0+i*bw;
    const upper=min+(i+1)/bins*(max-min);
    const bad = thresh!=null && upper<=thresh+1e-9;
    bars+=`<rect x="${x+1.5}" y="${yb-h}" width="${bw-3}" height="${h}" rx="2" fill="${bad?'var(--red)':'var(--teal-d)'}" opacity="0.9"/>`;
    if(cnt[i]>0) bars+=`<text x="${x+bw/2}" y="${yb-h-3}" font-size="8" fill="var(--mut)" text-anchor="middle">${cnt[i]}</text>`;
  }
  let axis=`<line x1="${x0}" y1="${yb}" x2="${x1}" y2="${yb}" stroke="var(--line)"/>`;
  const ticks = pctTicks?[0,.25,.5,.75,1]:[0,.5,1];
  ticks.forEach(t=>{const v=min+t*(max-min); axis+=`<text x="${xof(v)}" y="${yb+13}" font-size="8" fill="var(--mut)" text-anchor="middle">${fmt(v)}</text>`;});
  const vline=(v,col)=> v==null?'':`<line x1="${xof(v)}" y1="${y0-6}" x2="${xof(v)}" y2="${yb}" stroke="${col}" stroke-width="2" stroke-dasharray="3 2"/><circle cx="${xof(v)}" cy="${y0-6}" r="2.5" fill="${col}"/>`;
  return svgW(bars+axis+vline(nm,'var(--amber)')+vline(cm,'var(--teal)'),140);
}

/* donut for Qudrat level mix — ring on top, legend below (RTL-safe) */
function donutChart(data){
  const g=groupBy(data,'level'), keys=Object.keys(g).sort();
  const tot=data.length||1, cols={L1:'var(--teal)',L2:'var(--blue)',L3:'var(--amber)'};
  const cx=70,cy=70,r=50,C=2*Math.PI*r; let off=0,arcs='';
  keys.forEach(k=>{const frac=g[k].length/tot; arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${cols[k]||'var(--mut)'}" stroke-width="20" stroke-dasharray="${frac*C} ${C}" stroke-dashoffset="${-off*C}" transform="rotate(-90 ${cx} ${cy})"/>`; off+=frac;});
  arcs+=`<text x="${cx}" y="${cy-2}" font-size="20" font-weight="800" fill="var(--txt)" text-anchor="middle">${tot}</text><text x="${cx}" y="${cy+16}" font-size="10" fill="var(--mut)" text-anchor="middle">${tr('students')}</text>`;
  const svg=`<svg viewBox="0 0 140 140" width="130" height="130" style="display:block;margin:0 auto">${arcs}</svg>`;
  const legend=`<div class="pielegend">${keys.map(k=>`<div class="pieleg"><span class="dot" style="background:${cols[k]||'var(--mut)'}"></span>${tr('Qudrat')} ${k.replace('L',tr('Level')+' ')} — <b>${g[k].length}</b> (${Math.round(g[k].length/tot*100)}%)</div>`).join('')}</div>`;
  return `<div class="pie-wrap">${svg}${legend}</div>`;
}

/* semicircle gauge for classroom temp */
function gaugeChart(cm,nm){
  const cx=160,cy=120,r=78;
  const pt=(a)=>[cx+r*Math.cos(Math.PI*(1-a)),cy-r*Math.sin(Math.PI*(1-a))];
  const arc=(a0,a1,col,w)=>{const[s0x,s0y]=pt(a0),[e1x,e1y]=pt(a1);return `<path d="M ${s0x} ${s0y} A ${r} ${r} 0 ${a1-a0>0.5?1:0} 1 ${e1x} ${e1y}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linecap="round"/>`;};
  const valCol = cm>=.7?'var(--green)':cm>=.5?'var(--amber)':'var(--red)';
  const[nx,ny]=pt(nm),[nx2,ny2]=[cx+(r+12)*Math.cos(Math.PI*(1-nm)),cy-(r+12)*Math.sin(Math.PI*(1-nm))];
  return svgW(
    arc(0,1,'var(--line)',16)+arc(0,cm,valCol,16)+
    `<line x1="${nx}" y1="${ny}" x2="${nx2}" y2="${ny2}" stroke="var(--amber)" stroke-width="2.5"/>`+
    `<text x="${cx}" y="${cy-14}" font-size="26" font-weight="800" fill="${valCol}" text-anchor="middle">${Math.round(cm*100)}%</text>`+
    `<text x="${cx}" y="${cy+6}" font-size="9" fill="var(--mut)" text-anchor="middle">${tr('your class temperature')}</text>`+
    `<text x="${cx-r}" y="${cy+15}" font-size="8" fill="var(--mut)" text-anchor="middle">0%</text><text x="${cx+r}" y="${cy+15}" font-size="8" fill="var(--mut)" text-anchor="middle">100%</text>`,140);
}

/* slope chart: class vs network Diagnostic -> EOC (value-add) */
function slopeChart(data){
  const cd=meanOf(data,'diag'),ce=meanOf(data,'eoc'),nd=NETMEAN('diag'),ne=NETMEAN('eoc');
  const x0=88,x1=232,y0=22,yb=118, yof=v=>yb-v*(yb-y0);
  const lineFor=(d,e,col,w)=>`<line x1="${x0}" y1="${yof(d)}" x2="${x1}" y2="${yof(e)}" stroke="${col}" stroke-width="${w}"/><circle cx="${x0}" cy="${yof(d)}" r="4" fill="${col}"/><circle cx="${x1}" cy="${yof(e)}" r="4" fill="${col}"/>`;
  return svgW(
    `<text x="${x0}" y="${yb+14}" font-size="9" fill="var(--mut)" text-anchor="middle">${tr('Diagnostic')}</text>`+
    `<text x="${x1}" y="${yb+14}" font-size="9" fill="var(--mut)" text-anchor="middle">${tr('EOC')}</text>`+
    lineFor(nd,ne,'var(--amber)',2)+lineFor(cd,ce,'var(--teal)',3)+
    `<text x="${x0-6}" y="${yof(cd)+3}" font-size="9" fill="var(--teal)" text-anchor="end" font-weight="700">${f2(cd)}</text>`+
    `<text x="${x1+6}" y="${yof(ce)+3}" font-size="9" fill="var(--teal)" font-weight="700">${f2(ce)}</text>`+
    `<text x="${x1+6}" y="${yof(ne)+3}" font-size="8.5" fill="var(--amber)">${f2(ne)}</text>`,140);
}

/* simple two-bar comparison: your class vs the rest */
function compareBars(cm,nm,fmt,max,below){
  const w=v=>Math.max(2,Math.round((v/max)*100))+'%';
  const youCol=below?'var(--red)':'var(--teal)';
  return `<div class="cmp">
    <div class="cmprow"><span class="cmplab">${tr('Your class')}</span><div class="cmptrack"><i style="width:${w(cm)};background:${youCol}"></i></div><b class="cmpval" style="color:${youCol}">${fmt(cm)}</b></div>
    <div class="cmprow"><span class="cmplab">${tr('The rest')}</span><div class="cmptrack"><i style="width:${w(nm)};background:var(--amber)"></i></div><b class="cmpval" style="color:var(--amber)">${fmt(nm)}</b></div>
  </div>`;
}
const METRIC_IC={growth:'📈',level:'🧭',diag:'🩺',eoc:'🏁',att:'📅',mission:'✅',trust:'🤝',practice:'🔁',corr:'🎯',exit:'🎫',temp:'🙋'};
function metricCard(m,data){
  const ic=METRIC_IC[m.k]||'📊';
  // Qudrat → pie ; Growth → line ; everything else → simple comparison bars
  if(m.type=='donut') return `<div class="mcard"><h4>${ic} ${tr(m.label)}</h4><div class="mdesc">${tr(m.advice)}</div>${donutChart(data)}</div>`;
  let cm,nm,fmt,max,below=false,body,verdict='';
  if(m.type=='slope'){
    cm=meanOf(data,'eoc')-meanOf(data,'diag'); nm=NETMEAN('eoc')-NETMEAN('diag');
    body=slopeChart(data);
    fmt=v=>'+'+f2(v)+' '+tr('pts');
  } else {
    const isCount=m.type=='histcount';
    cm=meanOf(data,m.k); nm=NETMEAN(m.k);
    fmt=isCount?kfmt:pct; max=isCount?Math.max(...STUDENTS.map(s=>s.practice)):1;
    below=m.thresh!=null && cm<m.thresh;
    body=compareBars(cm,nm,fmt,max,below);
  }
  if(cm!=null&&nm!=null){const up=cm>=nm;
    verdict=`<span class="vbadge ${up?'up':'down'}">${up?tr('▲ above the rest'):tr('▼ below the rest')}</span>`;}
  return `<div class="mcard"><div class="mhead"><h4>${ic} ${tr(m.label)}</h4>${verdict}</div>
    <div class="mdesc">${tr(m.advice)}</div>${body}</div>`;
}

  const cards=[
    {l:tr('Students'),v:a.n},
    {l:tr('Overall score'),v:pct(a.score),note:tr('all 10 metrics'),k:'score',t:'pct'},
    {l:tr('Avg learning gain'),v:(a.growth>=0?'+':'')+f2(a.growth)+' '+tr('pts'),note:tr('EOC − Diagnostic'),k:'growth',t:'gain'},
    {l:tr('Avg diagnostic'),v:pct(a.diag),note:tr('baseline'),k:'diag',t:'pct'},
    {l:tr('Avg EOC mastery'),v:pct(a.eoc),note:tr('end-of-course'),k:'eoc',t:'pct'},
    {l:tr('Avg attendance'),v:pct(a.att),k:'att',t:'pct'},
    {l:tr('Avg mission completion'),v:pct(a.mission),k:'mission',t:'pct'},
    {l:tr('Avg trust'),v:pct(a.trust),k:'trust',t:'pct'},
    {l:tr('Avg practice attempts'),v:kfmt(a.practice),k:'practice',t:'count'},
    {l:tr('Avg correct practice'),v:pct(a.corr),k:'corr',t:'pct'},
    {l:tr('Avg exit ticket'),v:pct(a.exit),k:'exit',t:'pct'},
    {l:tr('Avg classroom temp'),v:pct(a.temp),k:'temp',t:'pct'},
    {l:tr('Need attention'),v:a.atRisk,note:a.high+' '+tr('high')+' · '+a.med+' '+tr('medium')}
  ];
  const delta=(c)=>{
    if(!base||!c.k||base[c.k]==null||a[c.k]==null) return '';
    const d=a[c.k]-base[c.k], up=d>=0, ar=up?'▲':'▼';
    let val = c.t=='count'? kfmt(Math.abs(d)) : c.t=='gain'? f2(Math.abs(d))+' '+tr('pts') : Math.round(Math.abs(d)*100)+'%';
    return `<div class="kpidelta" style="color:${up?'var(--green)':'var(--red)'}">${ar} ${val}</div>`;
  };
  return `<div class="kpis">${cards.map(c=>`
    <div class="kpi"><div class="lbl">${c.l}</div><div class="val">${c.v}</div>${c.note?`<div class="note">${c.note}</div>`:''}${delta(c)}</div>`).join('')}</div>`;
}
function barCell(v,color){
  return `<div class="num">${pct(v)}</div><div class="bar"><i style="width:${Math.round((v||0)*100)}%;background:${color||scoreColor(v)}"></i></div>`;
}

/* ---------- LEVEL TABLE (schools or classes) ---------- */
function levelTable(groups, labelKey, title, desc, drillRole){
  const rows = Object.entries(groups).map(([key,arr])=>({key,a:agg(arr),arr}));
  const sk=state.sort.key, dir=state.sort.dir;
  rows.sort((x,y)=>{
    let xv = sk=='key'? x.key : x.a[sk], yv = sk=='key'? y.key : y.a[sk];
    if(xv==null)xv=-1; if(yv==null)yv=-1;
    return (xv>yv?1:xv<yv?-1:0)*dir;
  });
  const head=(k,t,r)=>`<th onclick="sortBy('${k}')" ${r?'class="num"':''}>${t}${sk==k?(dir>0?' ▲':' ▼'):''}</th>`;
  const medal=i=>['🥇','🥈','🥉'][i]||'';
  const mcell=(v,fmt)=>`<td class="num" style="color:${scoreColor(v)}">${fmt?fmt(v):pct(v)}</td>`;
  const body = rows.map((r,i)=>{
    const a=r.a, rankBad=a.atRisk/a.n;
    const lv=groupBy(r.arr,'level');
    const qmix=Object.keys(lv).sort().map(k=>k+':'+lv[k].length).join(' ');
    return `<tr onclick="drill('${labelKey}','${r.key}')">
      <td class="num"><span class="rankcell">${medal(i)||'#'+(i+1)}</span></td>
      <td><b>${labelKey=='school'?r.key:facName(r.key)}</b><div class="flag">${labelKey=='school'?(new Set(r.arr.map(s=>s.fac)).size+' '+tr('facilitators')):(r.arr[0].school)}</div></td>
      <td class="num">${a.n}</td>
      <td>${barCell(a.score, scoreColor(a.score))}<div class="flag" style="text-align:center">${pct(a.score)}</div></td>
      <td class="num" style="color:${gColor(a.growth)}">${(a.growth>=0?'+':'')+f2(a.growth)}</td>
      <td class="num flag">${qmix}</td>
      ${mcell(a.diag)}${mcell(a.eoc)}${mcell(a.att)}${mcell(a.mission)}${mcell(a.trust)}
      ${mcell(a.practice,kfmt)}${mcell(a.corr)}${mcell(a.exit)}${mcell(a.temp)}
      <td class="num"><span class="pill ${rankBad>=.4?'p-red':rankBad>=.25?'p-amber':'p-green'}">${a.atRisk} (${Math.round(rankBad*100)}%)</span></td>
    </tr>`;
  }).join('');
  return `<div class="card full">
    <h3>${tr(title)}</h3><div class="desc">${tr(desc)}</div>
    <div class="tscroll"><table><thead><tr>
      <th class="num">${tr('Rank')}</th>
      ${head('key',labelKey=='school'?tr('School'):tr('Facilitator'))}
      ${head('n',tr('Students'),1)}
      ${head('score',tr('Overall score'),1)}
      ${head('growth',tr('Gain'),1)}
      <th class="num">${tr('Qudrat')}</th>
      ${head('diag',tr('Diag'),1)}
      ${head('eoc',tr('EOC'),1)}
      ${head('att',tr('Att'),1)}
      ${head('mission',tr('Missions'),1)}
      ${head('trust',tr('Trust'),1)}
      ${head('practice',tr('Practice'),1)}
      ${head('corr',tr('Accuracy'),1)}
      ${head('exit',tr('Exit'),1)}
      ${head('temp',tr('Temp'),1)}
      ${head('atRisk',tr('Need attention'),1)}
    </tr></thead><tbody>${body}</tbody></table></div>
    <div class="hint">${tr('Ranked by the Overall score — a composite of all 10 metrics. Click any column to re-sort, or any row to drill in.')}</div>
  </div>`;
}

/* ---------- STUDENT TABLE ---------- */
function studentTable(arr){
  const rows = arr.map(s=>({s,a:assess(s)}));
  const order={high:0,med:1,low:2,ok:3};
  const sk=state.sort.key,dir=state.sort.dir;
  rows.sort((x,y)=>{
    if(sk=='score'){return ((compositeScore(x.s)>compositeScore(y.s)?1:-1))*dir;}
    if(sk=='growth'){return (((x.a.g??-1)>(y.a.g??-1)?1:-1))*dir;}
    if(['diag','eoc','att','mission','trust','practice','corr','exit','temp'].includes(sk)){
      return (((x.s[sk]??-1)>(y.s[sk]??-1)?1:-1))*dir;
    }
    return (order[x.a.tier]-order[y.a.tier]) || (y.a.score-x.a.score);
  });
  const mcell=(v,fmt)=>`<td class="num" style="color:${scoreColor(v)}">${fmt?fmt(v):pct(v)}</td>`;
  const body=rows.map(({s,a})=>{
    const T=TIER[a.tier], ov=compositeScore(s);
    return `<tr>
      <td><div style="display:flex;align-items:center">${avatar(s)}<div><b>${s.name}</b><div class="flag">#${s.id} · ${s.level} · ${facName(s.fac)}</div></div></div></td>
      <td>${barCell(ov, scoreColor(ov))}<div class="flag" style="text-align:center">${pct(ov)}</div></td>
      <td><span class="pill ${T.c}">${tr(T.t)}</span></td>
      <td class="num" style="color:${gColor(a.g)}"><b>${a.g==null?'—':(a.g>=0?'+':'')+f2(a.g)}</b></td>
      ${mcell(s.diag)}${mcell(s.eoc)}${mcell(s.att)}${mcell(s.mission)}${mcell(s.trust)}
      ${mcell(s.practice,kfmt)}${mcell(s.corr)}${mcell(s.exit)}${mcell(s.temp)}
      <td class="twrap flag">${a.flags.slice(0,2).map(f=>tr(f.txt)).join(' · ')||'—'}</td>
      <td class="twrap" style="font-size:12.5px;color:var(--txt)">${tr(action(s,a))}</td>
    </tr>`;
  }).join('');
  const head=(k,t,r)=>`<th onclick="sortBy('${k}')" ${r?'class="num"':''}>${t}${state.sort.key==k?(dir>0?' ▲':' ▼'):''}</th>`;
  return `<div class="card full">
    <h3>${tr('Student action list')}</h3>
    <div class="desc">${tr('Each student is scored on all 10 metrics (Overall), with priority, why, and the next action.')}</div>
    <div class="tscroll"><table><thead><tr>
      <th>${tr('Student')}</th>
      ${head('score',tr('Overall score'),1)}
      <th>${tr('Priority')}</th>
      ${head('growth',tr('Gain'),1)}
      ${head('diag',tr('Diag'),1)}${head('eoc',tr('EOC'),1)}${head('att',tr('Att'),1)}${head('mission',tr('Missions'),1)}${head('trust',tr('Trust'),1)}
      ${head('practice',tr('Practice'),1)}${head('corr',tr('Accuracy'),1)}${head('exit',tr('Exit'),1)}${head('temp',tr('Temp'),1)}
      <th>${tr('Why')}</th><th>${tr('Recommended next action')}</th>
    </tr></thead><tbody>${body}</tbody></table></div>
  </div>`;
}

/* ---------- distribution / mix card ---------- */
function mixCard(arr,label){
  const a=agg(arr);
  const seg=[['On track',a.ok,'var(--green)'],['Watch/Medium',a.med,'var(--amber)'],['High priority',a.high,'var(--red)']];
  const tot=a.n||1;
  return `<div class="card">
    <h3>${tr('Attention mix')} · ${label}</h3>
    <div class="desc">${tr('How the cohort splits by priority today.')}</div>
    <div class="stack">${seg.map(s=>`<i title="${tr(s[0])}: ${s[1]}" style="width:${s[1]/tot*100}%;background:${s[2]}"></i>`).join('')}</div>
    <div class="legend">${seg.map(s=>`<span><span class="dot" style="background:${s[2]}"></span>${tr(s[0])} — <b>${s[1]}</b></span>`).join('')}</div>
    <div style="margin-top:16px">
      ${[['Overall score',a.score],['Diagnostic result',a.diag],['EOC Overall result',a.eoc],['Attendance',a.att],['Mission completion',a.mission],['Trust',a.trust],['Practice accuracy',a.corr],['Exit-ticket mastery',a.exit],['Classroom temp',a.temp]]
        .map(m=>`<div style="margin:7px 0"><div style="display:flex;justify-content:space-between"><span class="flag">${tr(m[0])}</span><span class="flag">${pct(m[1])}</span></div>
        <div class="bar"><i style="width:${(m[1]||0)*100}%;background:${scoreColor(m[1])}"></i></div></div>`).join('')}
    </div>
  </div>`;
}

/* ---------- top watchlist card (cross-cohort) ---------- */
function watchlist(arr,label){
  const rows=arr.map(s=>({s,a:assess(s)})).filter(r=>r.a.tier=='high')
    .sort((x,y)=>y.a.score-x.a.score).slice(0,8);
  return `<div class="card">
    <h3>${tr('Top priority students')} · ${label}</h3>
    <div class="desc">${state.lang=='ar'?`تم إبراز ${rows.length} من أكثر الطلاب احتياجًا للاهتمام الفوري.`:`The ${rows.length} highest-need students surfaced for immediate attention.`}</div>
    <table><tbody>${rows.map(({s,a})=>`<tr>
      <td><div style="display:flex;align-items:center">${avatar(s)}<div><b>${s.name}</b><div class="flag">${s.school} · ${facName(s.fac)}</div></div></div></td>
      <td class="flag">${a.flags[0]?tr(a.flags[0].txt):''}</td>
      <td class="num" style="color:${gColor(a.g)}"><b>${a.g==null?'—':(a.g>=0?'+':'')+f2(a.g)}</b></td>
    </tr>`).join('')||`<tr><td class="flag">${tr('None flagged high 🎉')}</td></tr>`}</tbody></table>
  </div>`;
}

/* ---------- main render ---------- */
/* ---------- scoping & filters ---------- */
function scoped(){
  let d=STUDENTS;
  if(state.role!='mgmt') d=d.filter(s=>s.school===state.ctxSchool);
  if(state.role=='fac'&&state.ctxFac!=null) d=d.filter(s=>s.fac==state.ctxFac);
  if(state.fSchool.length) d=d.filter(s=>state.fSchool.includes(s.school));
  if(state.fFac.length) d=d.filter(s=>state.fFac.includes(s.fac));
  if(state.fStudent.length) d=d.filter(s=>state.fStudent.includes(s.id));
  return d;
}
function activeLevel(){
  if(state.role=='fac') return 'student';
  if(state.fStudent.length||state.fFac.length) return 'student';
  if(state.role=='leader') return 'class';
  if(state.fSchool.length) return 'class';
  return 'school';
}
function scopeText(){
  const lvl=activeLevel();
  if(state.role=='fac') return `${state.ctxSchool} · ${facName(state.ctxFac)} — ${tr('your students')}`;
  if(state.role=='leader'){
    if(lvl=='class') return `${state.ctxSchool} · ${tr('all classes')}`;
    return `${state.ctxSchool} · ${state.fStudent.length?state.fStudent.length+' '+tr('students selected'):tr('selected classes')}`;
  }
  if(lvl=='school') return tr('Network overview · all 5 schools');
  if(lvl=='class') return tr('Classes in')+' '+(state.fSchool.join(', ')||'…');
  return tr('Students')+(state.fFac.length?' · '+tr('selected classes'):'')+(state.fStudent.length?` · ${state.fStudent.length} ${tr('selected')}`:'');
}
function optionsFor(field){
  if(field=='fSchool') return uniq(STUDENTS,'school').sort().map(v=>({v,lbl:v}));
  if(field=='fFac'){
    let b=STUDENTS;
    if(state.role!='mgmt') b=b.filter(s=>s.school===state.ctxSchool);
    if(state.fSchool.length) b=b.filter(s=>state.fSchool.includes(s.school));
    return uniq(b,'fac').sort((a,b)=>a-b).map(v=>{
      const sc=STUDENTS.find(s=>s.fac==v).school;
      return {v,lbl:facName(v)+(state.role=='mgmt'?` · ${sc}`:'')};
    });
  }
  let b=STUDENTS;
  if(state.role!='mgmt') b=b.filter(s=>s.school===state.ctxSchool);
  if(state.role=='fac'&&state.ctxFac!=null) b=b.filter(s=>s.fac==state.ctxFac);
  if(state.fSchool.length) b=b.filter(s=>state.fSchool.includes(s.school));
  if(state.fFac.length) b=b.filter(s=>state.fFac.includes(s.fac));
  return b.slice().sort((x,y)=>x.id-y.id).map(s=>({v:s.id,lbl:`${s.name} · ${facName(s.fac)}`}));
}
function rowsHTML(field,search){
  const sel=state[field];
  let opts=optionsFor(field);
  if(search){const q=search.toLowerCase(); opts=opts.filter(o=>(''+o.lbl).toLowerCase().includes(q));}
  if(!opts.length) return `<div class="msrow" style="color:var(--mut)">${tr('No matches')}</div>`;
  return opts.slice(0,400).map(o=>{
    const on=sel.includes(o.v);
    const val=typeof o.v=='string'?`'${o.v}'`:o.v;
    return `<div class="msrow ${on?'on':''}" onclick="toggleVal('${field}',${val})"><span class="ck">${on?'✓':''}</span>${o.lbl}</div>`;
  }).join('');
}
function ms(field,label){
  const sel=state[field], open=state.openMS==field, count=sel.length;
  return `<div class="ms">
    <button class="mstrig ${count?'has':''}" onclick="toggleMS('${field}',event)">${label}${count?` · ${count}`:''} <span class="car">▾</span></button>
    <div class="mspanel" style="display:${open?'block':'none'}">
      <input class="mssearch" placeholder="${tr('Search…')}" value="${open?state.msSearch:''}" oninput="onSearch(this.value)" onclick="event.stopPropagation()">
      <div class="msrows" id="msrows-${field}">${rowsHTML(field,open?state.msSearch:'')}</div>
      ${count?`<div class="msclear" onclick="clearMS('${field}',event)">${tr('Clear')} ${count} ${tr('selected')}</div>`:''}
    </div>
  </div>`;
}
function ctxSelect(){
  if(state.role=='mgmt') return '';
  const schools=uniq(STUDENTS,'school').sort();
  let h=`<div class="ctx">${tr('Viewing as')} <select onchange="setCtxSchool(this.value)">${schools.map(x=>`<option ${x==state.ctxSchool?'selected':''}>${x}</option>`).join('')}</select>`;
  if(state.role=='fac'){
    const classes=uniq(STUDENTS.filter(s=>s.school===state.ctxSchool),'fac').sort((a,b)=>a-b);
    h+=`<select onchange="setCtxFac(this.value)">${classes.map(c=>`<option value="${c}" ${c==state.ctxFac?'selected':''}>${facName(c)}</option>`).join('')}</select>`;
  }
  return h+`</div>`;
}
function filterBar(){
  let parts=[];
  const ctx=ctxSelect(); if(ctx) parts.push(ctx);
  if(state.role=='mgmt') parts.push(ms('fSchool',tr('School')));
  if(state.role!='fac') parts.push(ms('fFac',tr('Facilitator')));
  parts.push(ms('fStudent',tr('Student')));
  const any=state.fSchool.length+state.fFac.length+state.fStudent.length;
  if(any) parts.push(`<button class="clearall" onclick="clearAll()">${tr('Clear filters ✕')}</button>`);
  return parts.join('');
}

function render(){
  saveState();
  document.documentElement.dir = state.lang=='ar'?'rtl':'ltr';
  document.documentElement.lang = state.lang;
  const RB={mgmt:'🏢 '+tr('Management'),leader:'🎓 '+tr('School Leader'),fac:'👤 '+tr('Facilitator')};
  document.querySelectorAll('.role button[data-role]').forEach(b=>{b.classList.toggle('active',b.dataset.role===state.role); b.textContent=RB[b.dataset.role];});
  document.getElementById('langbtn').textContent = state.lang=='ar'?'EN':'العربية';
  document.getElementById('h-title').textContent=tr('Facilitators Operations Dashboard');
  document.getElementById('h-sub').textContent=tr('Turning the semester dataset into who needs attention, why, and what to do next.');
  document.getElementById('h-stat').innerHTML='427 '+tr('students')+' · 5 '+tr('schools')+' · 21 '+tr('classes')+'<br>'+tr('Semester snapshot');
  if(state.role!='fac') state.tab='dashboard';   // Action Plan is facilitator-only
  document.getElementById('sidebar').style.display = state.sbOpen?'':'none';
  document.getElementById('sbtoggle').classList.toggle('on',state.sbOpen);
  document.getElementById('sidebar').innerHTML=sidebar();
  document.getElementById('filterbar').innerHTML=filterBar();
  document.getElementById('crumb').innerHTML=scopeText();
  const data=scoped(), a=agg(data), lvl=activeLevel(), lbl=scopeText();
  if(state.tab=='action'){ document.getElementById('app').innerHTML=actionPlanView(data); return; }
  if(state.tab=='today'){ document.getElementById('app').innerHTML=dailyOverview(data); return; }
  const kpiBase = kpiBaseline();
  let html = kpiCmpBar() + kpiRow(a, kpiBase);
  if(lvl=='school'){
    html+=levelTable(groupBy(data,'school'),'school','Schools — ranked by learning gain',
      'The network at a glance. Spot which schools add the most value and which carry the most at-risk load.');
    html+=`<div class="grid2">${mixCard(data,tr('All schools'))}${watchlist(data,tr('network-wide'))}</div>`;
    html+=levelTable(groupBy(data,'fac'),'fac','All facilitators — ranked across the network',
      'Every facilitator network-wide, ranked by the overall composite score. Coaching attention should follow the bottom.');
  } else if(lvl=='class'){
    html+=`<div class="grid2">${mixCard(data,lbl)}${watchlist(data,lbl)}</div>`;
    html+=levelTable(groupBy(data,'fac'),'fac','Classes — ranked by learning gain',
      'Compare facilitators on a like-for-like basis. Coaching attention should follow the bottom of this list.');
  } else {
    html+=`<div class="grid2">${mixCard(data,lbl)}${watchlist(data,lbl)}</div>`;
    if(state.role=='fac') html+=metricsSection(data);
    html+=studentTable(data);
  }
  document.getElementById('app').innerHTML=html;
}
function renderBar(){document.getElementById('filterbar').innerHTML=filterBar();}

/* ---------- interactions ---------- */
function drill(type,key){
  if(type=='school'){state.fSchool=[key];state.fFac=[];state.fStudent=[];state.sort={key:'score',dir:-1};}
  if(type=='fac'){state.fFac=[Number(key)];state.fStudent=[];state.sort={key:'tier',dir:1};}
  state.openMS=null; render();
}
function reset(){state.fSchool=[];state.fFac=[];state.fStudent=[];render();}
function clearAll(){state.fSchool=[];state.fFac=[];state.fStudent=[];render();}
function sortBy(k){ if(state.sort.key===k)state.sort.dir*=-1; else state.sort={key:k,dir:k=='key'?1:-1}; render();}

/* multi-select interactions */
function toggleMS(field,e){e&&e.stopPropagation(); if(state.openMS==field){state.openMS=null;}else{state.openMS=field;state.msSearch='';} renderBar();}
function toggleVal(field,v){
  const a=state[field], i=a.indexOf(v);
  if(i>=0)a.splice(i,1); else a.push(v);
  if(field=='fSchool'){state.fFac=[];state.fStudent=[];}
  if(field=='fFac'){state.fStudent=[];}
  render();
}
function clearMS(field,e){e&&e.stopPropagation(); state[field]=[]; if(field=='fSchool'){state.fFac=[];state.fStudent=[];} if(field=='fFac')state.fStudent=[]; render();}
function onSearch(v){state.msSearch=v; const c=document.getElementById('msrows-'+state.openMS); if(c)c.innerHTML=rowsHTML(state.openMS,v);}
function setCtxSchool(v){state.ctxSchool=v; state.fSchool=[];state.fFac=[];state.fStudent=[]; if(state.role=='fac')state.ctxFac=firstClass(v); render();}
function setCtxFac(v){state.ctxFac=Number(v); state.fStudent=[]; render();}

document.querySelectorAll('.role button').forEach(b=>b.addEventListener('click',()=>{
  state.role=b.dataset.role;
  state.fSchool=[];state.fFac=[];state.fStudent=[];state.openMS=null;state.msSearch='';
  if(state.role=='fac'){ state.ctxFac=firstClass(state.ctxSchool); state.tab='today'; }
  state.sort=state.role=='fac'?{key:'tier',dir:1}:{key:'score',dir:-1};
  render();
}));
document.addEventListener('click',e=>{ if(state.openMS && !e.target.closest('.ms')){state.openMS=null;renderBar();} });

render();
</script>
</body>
</html>
